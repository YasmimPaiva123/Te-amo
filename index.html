<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>💍</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        background: linear-gradient(
            135deg,
            #ff6b6b,
            #feca57,
            #48dbfb,
            #1dd1a1,
            #5f27cd
        );

        font-family: Arial, sans-serif;
    }

    h1 {
        color: white;
        font-size: 80px;
        text-align: center;
        font-family: 'Great Vibes', cursive;
        text-shadow: 2px 2px 15px rgba(0,0,0,0.3);
        margin-bottom: 40px;
    }

    button {
        padding: 15px 40px;
        font-size: 20px;
        border: none;
        border-radius: 30px;
        background-color: white;
        color: #ff4d6d;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    button:hover {
        transform: scale(1.1);
        background-color: #ff4d6d;
        color: white;
    }

    #resposta {
        margin-top: 20px;
        font-size: 30px;
        color: white;
        display: none;
    }

    /* Esconde o vídeo */
    iframe {
        display: none;
    }
</style>
</head>

<body>

<h1>Vamos casar 💍</h1>

<button onclick="aceitou()">SIM 💖</button>

<p id="resposta">Eu sabia!!! 😍💍❤️</p>

<!-- YouTube (Sinais - Luan Santana) -->
<iframe id="ytplayer"
    width="0"
    height="0"
    src=""
    frameborder="0"
    allow="autoplay">
</iframe>

<script>
    function aceitou() {
        document.getElementById("resposta").style.display = "block";

        // inicia a música ao clicar
        document.getElementById("ytplayer").src =
        "https://www.youtube.com/embed/hCMp0z0JrjQ?autoplay=1&loop=1&playlist=hCMp0z0JrjQ";
    }
</script>

</body>
</html>
