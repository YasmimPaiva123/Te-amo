<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title> depressão </title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #ff4d6d, #f4c7c7);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }

    h1 {
        color: rgb(1, 0, 0);
        font-size: 60px;
        text-align: center;
        z-index: 1;
        text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    }

    /* Corações */
    .heart {
        position: absolute;
        width: 20px;
        height: 20px;
        background: red;
        transform: rotate(45deg);
        animation: subir 6s linear infinite;
    }

    .heart::before,
    .heart::after {
        content: "";
        position: absolute;
        width: 20px;
        height: 20px;
        background: red;
        border-radius: 50%;
    }

    .heart::before {
        top: -10px;
        left: 0;
    }

    .heart::after {
        left: -10px;
        top: 0;
    }

    @keyframes subir {
        0% {
            transform: translateY(0) rotate(45deg);
            opacity: 1;
        }
        100% {
            transform: translateY(-800px) rotate(45deg);
            opacity: 0;
        }
    }
</style>
</head>

<body>

<h1> Eu estou morrendo de saudadessss </h1>

<script>
    function criarCoracao() {
        const heart = document.createElement("div");
        heart.classList.add("heart");

        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.animationDuration = (3 + Math.random() * 3) + "s";

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 6000);
    }

    setInterval(criarCoracao, 300);
</script>

</body>
</html>
