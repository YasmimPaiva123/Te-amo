<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>💍</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow: hidden;

        background: linear-gradient(
            135deg,
            #ff6b6b,
            #feca57,
            #48dbfb,
            #1dd1a1,
            #5f27cd
        );
    }

    h1 {
        color: white;
        font-size: 80px;
        text-align: center;
        font-family: 'Great Vibes', cursive;
        margin-bottom: 40px;
        transition: 0.5s;
    }

    button {
        padding: 15px 40px;
        font-size: 22px;
        border: none;
        border-radius: 30px;
        background-color: white;
        color: #ff4d6d;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.1);
        background-color: #ff4d6d;
        color: white;
    }

    #mensagem {
        position: absolute;
        color: white;
        font-size: 50px;
        text-align: center;
        font-family: 'Great Vibes', cursive;
        opacity: 0;
        transition: 1s;
    }

    iframe {
        position: fixed;
        bottom: 10px;
        right: 10px;
        width: 200px;
        height: 120px;
        border-radius: 10px;
        opacity: 0.3;
    }
</style>
</head>

<body>

<h1 id="titulo">Vamos casar 💍</h1>

<button onclick="aceitou()">SIM 💖</button>

<div id="mensagem">Você é o amor da minha vida ❤️</div>

<iframe id="player"
src=""
allow="autoplay">
</iframe>

<script>
function aceitou() {

    // esconder título e botão
    document.getElementById("titulo").style.opacity = "0";
    document.querySelector("button").style.display = "none";

    // mostrar mensagem
    setTimeout(() => {
        document.getElementById("mensagem").style.opacity = "1";
    }, 500);

    // tocar música
    document.getElementById("player").src =
    "https://www.youtube.com/embed/hCMp0z0JrjQ?autoplay=1";
}
</script>

</body>
</html>
